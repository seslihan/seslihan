<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Toplantı planla — Seslihan</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css?v=4" />
</head>
<body class="schedule-body">
  <header class="app-header">
    <a href="/" class="app-brand">
      <img src="/seslihanlogo2.png" alt="Seslihan" class="logo-transparent" />
    </a>
    <div class="app-header-actions">
      <a href="/" class="icon-btn" data-tooltip="Ana sayfa">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
    </div>
  </header>

  <main class="schedule-main">
    <div class="schedule-header-row">
      <h1>Toplantıları planla</h1>
      <button id="newBtn" class="btn primary">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Yeni toplantı
      </button>
    </div>

    <div id="list" class="schedule-list"></div>

    <div id="form" class="settings-section schedule-form" hidden>
      <h3 id="formTitle">Yeni toplantı</h3>
      <div class="field"><label>Toplantı adı</label><input id="mTitle" type="text" placeholder="Haftalık ekip toplantısı" /></div>
      <div class="schedule-form-grid">
        <div class="field"><label>Tarih</label><input id="mDate" type="date" /></div>
        <div class="field"><label>Saat</label><input id="mTime" type="time" /></div>
      </div>
      <div class="field"><label>Süre (dakika)</label><input id="mDuration" type="number" value="60" min="5" max="480" /></div>
      <div class="field"><label>Açıklama (opsiyonel)</label><textarea id="mDesc" rows="2" class="schedule-textarea"></textarea></div>
      <div class="schedule-form-actions">
        <button id="saveBtn" class="btn primary">Kaydet</button>
        <button id="cancelBtn" class="btn">İptal</button>
        <button id="icsBtn" class="btn small">.ics indir</button>
      </div>
    </div>
  </main>

  <div class="toast-host" id="toastHost"></div>

  <script src="/js/common.js"></script>
  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const list = $('list');
      const form = $('form');
      const newBtn = $('newBtn');
      const cancelBtn = $('cancelBtn');
      const saveBtn = $('saveBtn');
      const icsBtn = $('icsBtn');
      let editingId = null;

      function render() {
        const items = getMeetings().filter(m => m.scheduledAt);
        if (items.length === 0) {
          list.innerHTML = '<div class="meeting-list-empty">Planlanmış toplantı yok. Yeni oluşturmak için "Yeni toplantı"ya tıklayın.</div>';
          return;
        }
        list.innerHTML = '';
        items.forEach(m => {
          const item = document.createElement('div');
          item.className = 'schedule-item';
          item.innerHTML =
            '<div class="meeting-item-icon">' +
              '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' +
            '</div>' +
            '<div class="schedule-item-info">' +
              '<div class="schedule-item-name">' + escapeHtml(m.title || 'Adsız toplantı') + '</div>' +
              '<div class="schedule-item-date">' + escapeHtml(new Date(m.scheduledAt).toLocaleString('tr-TR')) + ' · ' + (m.duration || 60) + ' dk · ' + escapeHtml(m.code) + '</div>' +
            '</div>' +
            '<button class="btn small" data-join="' + m.code + '">Katıl</button>' +
            '<button class="btn small" data-del="' + m.id + '">Sil</button>';
          list.appendChild(item);
        });
        list.querySelectorAll('[data-join]').forEach(b => b.addEventListener('click', () => {
          const c = b.dataset.join;
          const n = localStorage.getItem('bs-name') || '';
          window.location.href = '/prejoin.html?code=' + encodeURIComponent(c) + (n ? '&name=' + encodeURIComponent(n) : '');
        }));
        list.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => {
          if (confirm('Silinsin mi?')) { removeMeeting(b.dataset.del); render(); }
        }));
      }

      function openForm(meeting) {
        editingId = meeting ? meeting.id : null;
        $('formTitle').textContent = meeting ? 'Toplantıyı düzenle' : 'Yeni toplantı';
        const code = meeting ? meeting.code : (Math.random().toString(36).slice(2, 6) + Math.random().toString(36).slice(2, 6)).toUpperCase();
        $('mTitle').value = meeting ? (meeting.title || '') : '';
        const d = meeting ? new Date(meeting.scheduledAt) : new Date(Date.now() + 60 * 60 * 1000);
        $('mDate').value = d.toISOString().slice(0, 10);
        $('mTime').value = d.toTimeString().slice(0, 5);
        $('mDuration').value = meeting ? (meeting.duration || 60) : 60;
        $('mDesc').value = meeting ? (meeting.desc || '') : '';
        form.hidden = false;
        form._code = code;
        form._meeting = meeting;
      }

      newBtn.addEventListener('click', () => openForm(null));
      cancelBtn.addEventListener('click', () => form.hidden = true);

      saveBtn.addEventListener('click', () => {
        const title = $('mTitle').value.trim();
        const date = $('mDate').value;
        const time = $('mTime').value;
        if (!date || !time) { toast('Tarih ve saat seçin', 'error'); return; }
        const scheduledAt = new Date(date + 'T' + time).getTime();
        const m = {
          id: editingId || Date.now().toString(36),
          title: title || 'Adsız toplantı',
          code: (form._meeting && form._meeting.code) || (Math.random().toString(36).slice(2, 6) + Math.random().toString(36).slice(2, 6)).toUpperCase(),
          scheduledAt,
          duration: parseInt($('mDuration').value, 10) || 60,
          desc: $('mDesc').value
        };
        const all = getMeetings().filter(x => x.id !== m.id);
        all.unshift(m);
        localStorage.setItem('bs-meetings', JSON.stringify(all.slice(0, 20)));
        form.hidden = true;
        render();
        toast('Toplantı kaydedildi', 'success');
      });

      icsBtn.addEventListener('click', () => {
        const code = (form._meeting && form._meeting.code) || 'XXXXX';
        const date = $('mDate').value;
        const time = $('mTime').value;
        if (!date || !time) { toast('Tarih ve saat girin', 'error'); return; }
        const start = new Date(date + 'T' + time);
        const end = new Date(start.getTime() + (parseInt($('mDuration').value, 10) || 60) * 60000);
        const ics = [
          'BEGIN:VCALENDAR',
          'VERSION:2.0',
          'PRODID:-//Seslihan//Meeting//TR',
          'BEGIN:VEVENT',
          'UID:' + code + '@seslihan.app',
          'DTSTART:' + icsDate(start),
          'DTEND:' + icsDate(end),
          'SUMMARY:' + ($('mTitle').value || 'Seslihan toplantısı'),
          'DESCRIPTION:' + ($('mDesc').value || '').replace(/\n/g, '\\n'),
          'LOCATION:' + window.location.origin + '/?code=' + code,
          'END:VEVENT',
          'END:VCALENDAR'
        ].join('\r\n');
        const blob = new Blob([ics], { type: 'text/calendar' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'meeting-' + code + '.ics';
        a.click();
        toast('.ics dosyası indirildi', 'success');
      });

      function icsDate(d) {
        return d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      }

      render();
    })();
  </script>
</body>
</html>
