<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Seslihan</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta property="og:title" content="Seslihan" />
  <meta property="og:image" content="/seslihanlogo2.png" />
  <link rel="stylesheet" href="/css/style.css?v=10" />
</head>
<body class="home">
  <header class="app-header">
    <div class="app-header-actions">
      <a href="/schedule.html" class="icon-btn" data-tooltip="Takvim" data-spa>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </a>
      <button id="themeBtn" class="icon-btn" data-tooltip="Tema">
        <svg class="theme-light" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="theme-dark" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" hidden><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="profile-menu" id="profileMenu">
        <button id="profileBtn" class="profile-avatar">M</button>
        <div id="profileDropdown" class="profile-dropdown" hidden>
          <div class="profile-dropdown-header">
            <div class="profile-dropdown-name" id="profileName">Misafir</div>
          </div>
          <button class="profile-dropdown-item" id="authBtn">Giriş yap / Kayıt ol</button>
          <a href="/settings.html" class="profile-dropdown-item">Ayarlar</a>
        </div>
      </div>
    </div>
  </header>

  <main class="home-main">
    <div class="home-logo-side">
      <img src="/seslihanlogo2.png" alt="Seslihan" class="home-logo-big" />
    </div>
    <div class="home-dashboard">

      <div class="dash-row">
        <section class="dash-card dash-hero">
          <h1>Bağlantıda kal, planları paylaş</h1>
          <div class="action-row">
            <button id="newMeetingBtn" class="btn primary">Yeni toplantı başlat</button>
            <button id="scheduleBtn" class="btn">Toplantı planla</button>
          </div>
          <form id="joinForm" class="join-form">
            <input id="roomCode" type="text" placeholder="Toplantı kodu veya bağlantı" maxlength="60" autocomplete="off" />
            <button type="submit" class="btn primary">Katıl</button>
          </form>
        </section>
        <aside class="dash-card dash-meetings">
          <h2>Toplantılar</h2>
          <div id="meetingList" class="meeting-list">
            <div class="meeting-list-empty">Henüz toplantı yok</div>
          </div>
        </aside>
      </div>

      <div class="dash-row dash-features">
        <a href="/tv.html" class="feat-card" data-spa><span class="feat-icon" style="background:#e30a17">📺</span><span class="feat-name">Canlı TV</span></a>
        <a href="/radio.html" class="feat-card" data-spa><span class="feat-icon" style="background:#ff9900">📻</span><span class="feat-name">Radyo</span></a>
        <a href="/stock.html" class="feat-card" data-spa><span class="feat-icon" style="background:var(--accent)">📈</span><span class="feat-name">Borsa</span></a>
        <a href="/whiteboard.html" class="feat-card" data-spa><span class="feat-icon" style="background:#6c2dc7">🎨</span><span class="feat-name">Tahta</span></a>
      </div>

      <div class="dash-stock" id="dashStock">
        <div class="dash-stock-inner" id="dashStockInner">
          <div id="dashStockItems" class="dash-stock-items">
            <span class="stock-loading-sm">Borsa yükleniyor...</span>
          </div>
        </div>
        <span id="dashStockTime" class="dash-stock-time"></span>
      </div>

      <div class="dash-namaz" id="dashNamaz">
        <div class="dash-namaz-header">
          <span class="dash-namaz-icon">🕌</span>
          <span class="dash-namaz-title">Namaz Vakitleri</span>
          <select id="dashNamazLocation" class="dash-namaz-select">
            <option value="9541" selected>İstanbul</option>
          </select>
          <span id="dashNamazNext" class="dash-namaz-next"></span>
        </div>
        <div id="dashNamazTimes" class="dash-namaz-times">
          <span class="stock-loading-sm">Yükleniyor...</span>
        </div>
      </div>

      <div class="dash-wisdom" id="dashWisdom">
        <div class="dash-wisdom-inner">
          <span class="dash-wisdom-icon">📖</span>
          <span class="dash-wisdom-text" id="dashWisdomText">Yükleniyor...</span>
          <span class="dash-wisdom-source" id="dashWisdomSource"></span>
        </div>
      </div>

      <div class="dash-row dash-news-row">
        <div class="dash-card dash-news">
          <div class="dash-card-header">
            <h2>Canlı Haberler</h2>
            <button id="newsRefreshBtn" class="btn tiny">↻ Yenile</button>
          </div>
          <div class="news-tabs">
            <button class="news-tab active" data-category="turkey">🇹🇷 Türkiye</button>
            <button class="news-tab" data-category="world">🌍 Dünya</button>
            <button class="news-tab" data-category="ai">🤖 YZ</button>
          </div>
          <div id="newsGrid" class="news-grid"></div>
          <span id="newsTime" class="news-time"></span>
        </div>

        <div class="dash-card dash-x">
          <div class="dash-card-header">
            <h2>X'ten Son Haberler</h2>
            <span class="live-badge"><span class="live-dot"></span>LIVE</span>
          </div>
          <div class="x-tabs" id="xTabs">
            <button class="x-tab active" data-handle="anadoluajansi">AA</button>
            <button class="x-tab" data-handle="CNNTurk">CNN</button>
            <button class="x-tab" data-handle="trthaber">TRT</button>
          </div>
          <div id="xFeed" class="x-feed">
            <div class="x-loading">Yükleniyor...</div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div class="name-gate-overlay" id="nameGateOverlay" hidden>
    <div class="name-gate-modal">
      <h2>Adınızı girin</h2>
      <p>Toplantıya katılmak için adınızı yazın</p>
      <input id="nameGateInput" type="text" placeholder="Adınız" maxlength="32" autocomplete="name" />
      <div class="name-gate-actions">
        <button id="nameGateCancel" class="btn">İptal</button>
        <button id="nameGateConfirm" class="btn primary">Devam</button>
      </div>
    </div>
  </div>

  <div class="toast-host" id="toastHost"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
