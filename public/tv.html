<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Seslihan — Canlı TV</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css?v=7" />
</head>
<body class="home">
  <header class="app-header">
    <a href="/" class="app-brand">
      <img src="/seslihanlogo2.png" alt="Seslihan" class="logo-transparent" />
    </a>
    <div class="app-header-actions">
      <button id="themeBtn" class="icon-btn" data-tooltip="Tema">
        <svg class="theme-light" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="theme-dark" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" hidden><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>
  <main class="home-main">
    <div class="standalone-page">
      <h1 class="standalone-title">📺 CANLI TV</h1>
      <p class="standalone-desc">Türk televizyon kanallarını canlı izleyin</p>
      <div id="tvGrid" class="tv-grid"></div>
      <div id="tvPlayer" class="tv-player" hidden>
        <div class="tv-player-header">
          <span id="tvChannelName" class="tv-channel-name"></span>
          <button id="tvClose" class="btn small">✕ Kapat</button>
        </div>
        <div class="tv-player-wrap">
          <div id="tvPlayerContainer"></div>
        </div>
      </div>
    </div>
  </main>
  <div class="toast-host" id="toastHost"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/common.js"></script>
  <script>
    const channels = [
      { id: 'cnnturk', name: 'CNN Türk', handle: '@CNNTurk', cid: 'UCV6zcRug6Hqp1UX_FdyUeBg', color: '#e30a17' },
      { id: 'trthaber', name: 'TRT Haber', handle: '@trthaber', cid: 'UCBgTP2LOFVPmq15W-RH-WXA', color: '#003399' },
      { id: 'haberturk', name: 'Habertürk TV', handle: '@haberturktv', cid: 'UCn6dNfiRE_Xunu7iMyvD7AA', color: '#e4002b' },
      { id: 'ntv', name: 'NTV', handle: '@ntv', cid: 'UCGMghpDmBAqhz2p7eLHX-eg', color: '#c8102e' },
      { id: 'showtv', name: 'Show TV', handle: '@showtv', cid: 'UC9JMe_We017gYrRc7kZHgmg', color: '#0066cc' },
      { id: 'ahaber', name: 'A Haber', handle: '@ahaber', cid: 'UCKQhfw-lzz0uKnE1fY1PsAA', color: '#c8102e' },
      { id: 'tv8', name: 'TV8', handle: '@tv8', cid: 'UCp4N3g1zcvp8WE2qJ_JKqBg', color: '#6c2dc7' },
      { id: '24tv', name: '24 TV', handle: '@24TV', cid: 'UCN7VYCsI4Lx1-J4_BtjoWUA', color: '#003366' }
    ];

    const grid = document.getElementById('tvGrid');
    const player = document.getElementById('tvPlayer');
    const container = document.getElementById('tvPlayerContainer');
    const channelName = document.getElementById('tvChannelName');

    channels.forEach(ch => {
      const card = document.createElement('div');
      card.className = 'tv-card';
      card.innerHTML = '<div class="tv-card-color" style="background:' + ch.color + '"></div><div class="tv-card-name">' + ch.name + '</div>';
      card.addEventListener('click', () => loadChannel(ch));
      grid.appendChild(card);
    });

    function loadChannel(ch) {
      channelName.textContent = ch.name;
      player.hidden = false;
      container.innerHTML = '<div class="tv-loading">Yükleniyor...</div>';
      fetch('/api/tv-rss/' + ch.cid)
        .then(r => r.json())
        .then(data => {
          if (data.videoId) {
            container.innerHTML = '<iframe src="https://www.youtube.com/embed/' + data.videoId + '?autoplay=1&mute=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>';
          } else {
            container.innerHTML = '<div class="tv-loading">Yayın bulunamadı — YouTube\'da canlı yayın yok</div>';
          }
        })
        .catch(() => container.innerHTML = '<div class="tv-loading">Bağlantı hatası</div>');
    }

    document.getElementById('tvClose').addEventListener('click', () => {
      player.hidden = true;
      container.innerHTML = '';
    });
  </script>
</body>
</html>
