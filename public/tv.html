<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Seslihan — Canlı TV</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css?v=11" />
</head>
<body class="home">
  <header class="app-header">
    <a href="/" class="app-brand" data-spa>
      <img src="/seslihanlogo2.png" alt="Seslihan" class="logo-transparent" />
    </a>
    <div class="app-header-actions">
      <button class="icon-btn" data-tooltip="Geri" onclick="history.back()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <button id="themeBtn" class="icon-btn" data-tooltip="Tema">
        <svg class="theme-light" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="theme-dark" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" hidden><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>
  <main class="home-main">
    <div class="standalone-page">
      <h1 class="standalone-title">📺 CANLI TV & İPTV</h1>
      <p class="standalone-desc">Canlı TV, film ve dizi kanallarını ücretsiz izleyin</p>

      <div class="tv-tabs" id="tvTabs">
        <button class="tv-tab active" data-tab="live">📺 Canlı TV</button>
        <button class="tv-tab" data-tab="movies">🎬 Filmler</button>
        <button class="tv-tab" data-tab="series">🎞️ Diziler</button>
        <button class="tv-tab" data-tab="iptv">📡 IPTV</button>
      </div>

      <div id="tvSearch" class="tv-search-wrap">
        <input id="tvSearchInput" type="text" placeholder="Kanal veya film ara..." class="tv-search" />
      </div>

      <div id="tvGrid" class="tv-grid"></div>
      <div id="tvLoading" class="tv-loading" hidden>Yükleniyor...</div>

      <div id="tvPlayer" class="tv-player" hidden>
        <div class="tv-player-header">
          <span id="tvChannelName" class="tv-channel-name"></span>
          <button id="tvClose" class="btn small">✕ Kapat</button>
        </div>
        <div class="tv-player-wrap">
          <div id="tvPlayerContainer"></div>
        </div>
      </div>
    </div>
  </main>
  <div class="toast-host" id="toastHost"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/common.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <script src="/js/tv.js"></script>
</body>
</html>
